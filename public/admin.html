<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Fostberg</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h1 {
            font-size: 28px;
            color: #e0e0e0;
        }
        .back-link {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: #0f0f0f;
            border-radius: 16px;
            overflow: hidden;
        }
        .users-table th, .users-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }
        .users-table th {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .role-admin { background: #8b1a1a; color: #fff; }
        .role-moderator { background: #4a6a8b; color: #fff; }
        .role-user { background: #2a2a2a; color: #888; }
        .action-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-right: 8px;
        }
        .btn-moderator { background: #4a6a8b; color: white; }
        .btn-user { background: #2a2a2a; color: #888; }
        .btn-delete { background: #8b1a1a; color: white; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error-message { background: #8b1a1a; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .success-message { background: #1a4a1a; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #0f0f0f;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #4CAF50; }
        .stat-label { color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🎧</span>
                    <span class="logo-text">Fostberg</span>
                </a>
<nav class="nav">
    <a href="index.html" class="nav-btn">Популярные</a>
    <a href="top.html" class="nav-btn">Топ пользователей</a>
    <a href="tracks.html" class="nav-btn">Все треки</a>
    <a href="write-review.html" class="nav-btn write-btn">✍️ Написать</a>
    <a href="add-track.html" class="nav-btn">➕ Добавить трек</a>
</nav>
            </div>
            <div class="header-right">
                <div class="auth-buttons" id="authButtons">
                    <button class="login-btn" id="loginBtn">Войти</button>
                </div>
                <div class="user-menu" id="userMenu" style="display:none">
                    <span id="profileName"></span>
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                </div>
            </div>
        </header>

        <main>
            <div class="admin-container" id="adminContent">
                <div class="loading">Проверка прав доступа...</div>
            </div>
        </main>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" id="switchToSignup">Зарегистрироваться</a></p>
        </div>
    </div>

    <div class="modal" id="signupModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Регистрация</h2>
            <form id="signupForm">
                <input type="text" id="signupUsername" placeholder="Имя пользователя" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('fostberg_token');
        let currentUser = null;

        // Загружаем текущего пользователя
        async function loadCurrentUser() {
            if (!token) return null;
            try {
                const res = await fetch(`${API_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    localStorage.setItem('fostberg_user', JSON.stringify(currentUser));
                    return currentUser;
                }
            } catch(e) {}
            return null;
        }

        function updateUI() {
            const authDiv = document.getElementById('authButtons');
            const userDiv = document.getElementById('userMenu');
            const profileName = document.getElementById('profileName');
            if (currentUser) {
                authDiv.style.display = 'none';
                userDiv.style.display = 'flex';
                if (profileName) profileName.textContent = currentUser.username;
            } else {
                authDiv.style.display = 'flex';
                userDiv.style.display = 'none';
            }
        }

        async function checkAdminAndLoad() {
            const container = document.getElementById('adminContent');
            
            // Загружаем пользователя если ещё нет
            if (!currentUser && token) {
                await loadCurrentUser();
                updateUI();
            }
            
            // Проверяем права
            if (!currentUser || currentUser.role !== 'admin') {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px;margin-bottom:16px;">🔒</div>
                        <div>Доступ запрещён</div>
                        <div style="margin-top:16px;">Только администраторы могут просматривать эту страницу</div>
                        <a href="index.html" style="display:inline-block; margin-top:16px; color:#4CAF50;">← Вернуться на главную</a>
                    </div>
                `;
                return;
            }
            
            // Загружаем админ-панель
            await loadAdminPanel();
        }

        async function loadAdminPanel() {
            const container = document.getElementById('adminContent');
            container.innerHTML = `
                <div class="admin-header">
                    <h1>👑 Админ-панель</h1>
                    <a href="index.html" class="back-link">← На главную</a>
                </div>
                <div id="adminMessage"></div>
                <div class="stats" id="stats"></div>
                <div class="users-table-container">
                    <table class="users-table">
                        <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Действия</th></tr></thead>
                        <tbody id="usersTableBody"><tr><td colspan="5" class="loading">Загрузка...</td></tr></tbody>
                    </table>
                </div>
            `;
            await loadUsers();
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Нет доступа');
                const users = await res.json();
                
                const stats = {
                    total: users.length,
                    admins: users.filter(u => u.role === 'admin').length,
                    moderators: users.filter(u => u.role === 'moderator').length,
                    users: users.filter(u => u.role === 'user').length
                };
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Всего</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.admins}</div><div class="stat-label">Админы</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.moderators}</div><div class="stat-label">Модераторы</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.users}</div><div class="stat-label">Пользователи</div></div>
                `;
                
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = users.map(user => {
                    let roleClass = user.role === 'admin' ? 'role-admin' : (user.role === 'moderator' ? 'role-moderator' : 'role-user');
                    let roleText = user.role === 'admin' ? 'Администратор' : (user.role === 'moderator' ? 'Модератор' : 'Пользователь');
                    const isCurrentUser = currentUser && currentUser.id === user.id;
                    
                    return `
                        <tr>
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.username)} ${isCurrentUser ? '👑 (вы)' : ''}</td>
                            <td>${escapeHtml(user.email)}</td>
                            <td><span class="role-badge ${roleClass}">${roleText}</span></td>
                            <td>
                                ${user.role !== 'admin' ? `
                                    ${user.role !== 'moderator' ? 
                                        `<button class="action-btn btn-moderator" onclick="changeRole(${user.id}, 'moderator')">🔨 Сделать модератором</button>` : 
                                        `<button class="action-btn btn-user" onclick="changeRole(${user.id}, 'user')">👤 Сделать пользователем</button>`
                                    }
                                ` : ''}
                                ${!isCurrentUser && user.role !== 'admin' ? 
                                    `<button class="action-btn btn-delete" onclick="deleteUser(${user.id})">🗑 Удалить</button>` : ''
                                }
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch(e) {
                document.getElementById('usersTableBody').innerHTML = `<tr><td colspan="5" class="loading">Ошибка: ${e.message}</td></tr>`;
            }
        }

        async function changeRole(userId, role) {
            if (!confirm(`Сделать пользователя ${role === 'moderator' ? 'модератором' : 'пользователем'}?`)) return;
            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ role })
                });
                if (!res.ok) throw new Error('Ошибка');
                showMessage('✅ Роль изменена', 'success');
                loadUsers();
            } catch(e) { showMessage('❌ Ошибка', 'error'); }
        }

        async function deleteUser(userId) {
            if (!confirm('Удалить пользователя? Все его рецензии будут удалены.')) return;
            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Ошибка');
                showMessage('✅ Пользователь удалён', 'success');
                loadUsers();
            } catch(e) { showMessage('❌ Ошибка', 'error'); }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('adminMessage');
            msgDiv.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}">${msg}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Модалки
        function openModal(type) {
            document.getElementById(type === 'login' ? 'loginModal' : 'signupModal').style.display = 'flex';
        }
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.onclick = () => {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('signupModal').style.display = 'none';
            };
        });
        window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        
        document.getElementById('loginBtn')?.addEventListener('click', () => openModal('login'));
        document.getElementById('switchToSignup')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginModal').style.display = 'none';
            openModal('signup');
        });
        document.getElementById('switchToLogin')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signupModal').style.display = 'none';
            openModal('login');
        });
        
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('fostberg_token', token);
                localStorage.setItem('fostberg_user', JSON.stringify(currentUser));
                document.getElementById('loginModal').style.display = 'none';
                updateUI();
                checkAdminAndLoad();
            } catch(err) { alert('Ошибка: ' + err.message); }
        });
        
        document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('fostberg_token', token);
                localStorage.setItem('fostberg_user', JSON.stringify(currentUser));
                document.getElementById('signupModal').style.display = 'none';
                updateUI();
                checkAdminAndLoad();
            } catch(err) { alert('Ошибка: ' + err.message); }
        });

        // Запуск
        (async function() {
            const savedUser = localStorage.getItem('fostberg_user');
            if (savedUser) {
                try { currentUser = JSON.parse(savedUser); updateUI(); } catch(e) {}
            }
            if (token) await loadCurrentUser();
            updateUI();
            await checkAdminAndLoad();
        })();
    </script>
</body>
</html>
