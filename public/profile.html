<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fostberg — мой профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/rating.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🎧</span>
                    <span class="logo-text">Fostberg</span>
                </a>
<button class="mobile-toggle" id="mobileToggle" style="display: none; background: none; border: none; color: #e0e0e0; font-size: 28px; cursor: pointer;">☰</button>
<nav class="nav">
    <a href="index.html" class="nav-btn">Популярные</a>
    <a href="top.html" class="nav-btn">Топ пользователей</a>
    <a href="tracks.html" class="nav-btn">Все треки</a>
    <a href="write-review.html" class="nav-btn write-btn">✍️ Написать</a>
    <a href="add-track.html" class="nav-btn active">➕ Добавить трек</a>
</nav>
            </div>
            <div class="header-right">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск треков...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="auth-buttons" id="authButtons" style="display: none;">
                    <button class="login-btn" id="loginBtn">Войти</button>
                    <button class="signup-btn" id="signupBtn">Регистрация</button>
                </div>
                <div class="user-menu" id="userMenu">
                    <a href="profile.html" class="profile-btn">
                        <span class="profile-avatar" id="profileAvatar">👤</span>
                        <span id="profileName">Профиль</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="content" class="content">
                <div class="profile-container">
                    <div class="profile-card">
                        <div class="profile-avatar-large" id="profileAvatarLarge">👤</div>
                        <button class="change-avatar-btn" id="changeAvatarBtn">✨ Сменить аватар</button>
                        <div class="photo-upload">
                            <label class="photo-upload-btn">📷 Загрузить фото
                                <input type="file" id="photoUpload" accept="image/*">
                            </label>
                        </div>
                        <h2 id="profileUsername">Загрузка...</h2>
                        <p id="profileEmail"></p>
                        <div class="profile-stats">
                            <div class="stat">
                                <span class="stat-value" id="reviewsCount">0</span>
                                <span class="stat-label">рецензий</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value" id="likesCount">0</span>
                                <span class="stat-label">лайков</span>
                            </div>
                        </div>
                        <a href="add-track.html" class="add-track-btn-profile" style="display: inline-flex; align-items: center; gap: 8px; margin: 16px 0; padding: 12px 24px; background: #2a2a2a; border-radius: 30px; color: #4CAF50; text-decoration: none; font-weight: 500;">
                            ➕ Добавить трек вручную
                        </a>
                        <button class="logout-btn-profile" id="logoutBtnProfile">🚪 Выйти из аккаунта</button>
                        <h3 style="margin-top: 24px; margin-bottom: 16px;">Мои рецензии</h3>
                        <div class="user-reviews-list" id="userReviewsList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Выберите аватар</h2>
            <div class="avatar-grid" id="avatarGrid"></div>
        </div>
    </div>

    <div id="loginModal" class="modal">...</div>
    <div id="signupModal" class="modal">...</div>

    <script src="js/app.js"></script>
</body>
</html>
