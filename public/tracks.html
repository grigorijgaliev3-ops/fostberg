<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fostberg — все треки</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .all-tracks-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .all-tracks-header {
            margin-bottom: 24px;
        }
        .all-tracks-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .all-tracks-header p {
            color: #666;
            font-size: 14px;
        }
        .all-tracks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .track-list-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: #0f0f0f;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            transition: all 0.2s;
            cursor: pointer;
        }
        .track-list-item:hover {
            transform: translateX(8px);
            background: #141414;
            border-color: #2a2a2a;
        }
        .track-list-rank {
            font-size: 18px;
            font-weight: 600;
            color: #666;
            min-width: 40px;
        }
        .track-list-cover {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a1a;
            flex-shrink: 0;
        }
        .track-list-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .track-list-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .track-list-info {
            flex: 1;
            min-width: 0;
        }
        .track-list-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .track-list-artist {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-list-stats {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .stat-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            background: #1a1a1a;
            color: #888;
        }
        .stat-badge.high {
            background: #4CAF50;
            color: white;
        }
        .stat-badge.medium {
            background: #FFC107;
            color: #000;
        }
        .stat-badge.low {
            background: #ff4444;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover {
            background: #2a2a2a;
        }
        .page-btn.active {
            background: #4a6a8b;
            border-color: #4a6a8b;
        }
        @media (max-width: 600px) {
            .track-list-stats {
                flex-direction: column;
                gap: 6px;
            }
            .track-list-rank {
                min-width: 30px;
                font-size: 14px;
            }
            .track-list-cover {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🎧</span>
                    <span class="logo-text">Fostberg</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-btn">Популярные</a>
                    <a href="top.html" class="nav-btn">Топ пользователей</a>
                    <a href="tracks.html" class="nav-btn active">Все треки</a>
                    <a href="write-review.html" class="nav-btn write-btn">✍️ Написать</a>
                    <a href="add-track.html" class="nav-btn">➕ Добавить трек</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск треков...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="auth-buttons" id="authButtons">
                    <button class="login-btn" id="loginBtn">Войти</button>
                    <button class="signup-btn" id="signupBtn">Регистрация</button>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <a href="profile.html" class="profile-btn">
                        <span class="profile-avatar" id="profileAvatar">👤</span>
                        <span id="profileName">Профиль</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="content" class="content">
                <div class="loading">Загрузка...</div>
            </div>
        </main>
    </div>

    <div id="loginModal" class="modal">...</div>
    <div id="signupModal" class="modal">...</div>

    <script src="js/app.js"></script>
</body>
</html>
