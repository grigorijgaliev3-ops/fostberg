<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fostberg — все треки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🎧</span>
                    <span class="logo-text">Fostberg</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-btn">Популярные</a>
                    <a href="top.html" class="nav-btn">Топ пользователей</a>
                    <a href="tracks.html" class="nav-btn active">Все треки</a>
                    <a href="write-review.html" class="nav-btn write-btn">✍️ Написать</a>
                    <a href="add-track.html" class="nav-btn">➕ Добавить трек</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск треков...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="auth-buttons" id="authButtons">
                    <button class="login-btn" id="loginBtn">Войти</button>
                    <button class="signup-btn" id="signupBtn">Регистрация</button>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <a href="profile.html" class="profile-btn">
                        <span class="profile-avatar" id="profileAvatar">👤</span>
                        <span id="profileName">Профиль</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="content" class="content">
                <div class="loading">Загрузка...</div>
            </div>
        </main>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" class="modal-input" id="loginEmail" required>
                <input type="password" placeholder="Пароль" class="modal-input" id="loginPassword" required>
                <button type="submit" class="modal-btn">Войти</button>
            </form>
            <p class="modal-hint">Нет аккаунта? <a href="#" id="switchToSignup">Зарегистрируйтесь</a></p>
        </div>
    </div>
    
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Регистрация</h2>
            <form id="signupForm">
                <input type="text" placeholder="Никнейм" class="modal-input" id="signupUsername" required>
                <input type="email" placeholder="Email" class="modal-input" id="signupEmail" required>
                <input type="password" placeholder="Пароль" class="modal-input" id="signupPassword" required>
                <button type="submit" class="modal-btn">Зарегистрироваться</button>
            </form>
            <p class="modal-hint">Уже есть аккаунт? <a href="#" id="switchToLogin">Войдите</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
